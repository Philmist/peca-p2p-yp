name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build, Test, Lint
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Rustfmt
        run: cargo fmt --check

      # cargo-audit は install が重いため 1 OS(高速な ubuntu)でのみ実行する。
      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    # dorny/paths-filter は pull_request イベントで PR の変更ファイル一覧 API を
    # 呼ぶため pull-requests: read が必要(無指定だと既定権限で 403 になる)
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Check dependency file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'Cargo.toml'
              - 'Cargo.lock'

      - name: Run Trivy vulnerability scanner
        if: steps.filter.outputs.deps == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          scanners: vuln
