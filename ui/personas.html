<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ペルソナ管理 — peca-p2p-yp</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.3rem 0.5rem; text-align: left; font-size: 0.9rem; }
    th { background: #f0f0f0; }
    .err { color: #b00; }
    .ok { color: #060; }
    .muted { color: #888; }
    .unavailable { color: #b00; font-style: italic; }
    .current-persona { background: #e6ffe6; font-weight: bold; }
    .notice { background: #fff3cd; border: 1px solid #ffc107; padding: 0.7rem 1rem; margin: 1rem 0; border-radius: 4px; }
    button { cursor: pointer; }
    .warning-box { background: #ffeeba; border: 1px solid #ffc107; padding: 0.7rem 1rem; margin: 0.5rem 0; border-radius: 4px; }
  </style>
</head>
<body>
  <p><a href="/index.html">&larr; トップ</a></p>
  <h1>ペルソナ管理</h1>

  <!-- 現在選択中ペルソナの常時明示 (contracts/local-api.md UI 要件 / ADR-0004 §7) -->
  <div id="current-persona-banner" class="notice" hidden>
    現在選択中のペルソナ: <strong id="current-persona-label">—</strong>
    (<code id="current-persona-pubkey"></code>)
  </div>
  <div id="no-current-banner" class="notice">
    現在選択中のペルソナはありません(未選択)。
  </div>
  <!-- 配信中ロックの理由表示 (FR-005 UI 側 — best-effort。真の強制はバックエンド) -->
  <div id="broadcasting-banner" class="warning-box" hidden>
    <strong>配信中です。</strong>配信中はペルソナを変更できません(切り替え・破棄・アーカイブは配信停止後に行えます)。
  </div>

  <!-- リンク推定の注意文言 (ADR-0004 §7 — MUST 常設) -->
  <div class="warning-box">
    <strong>注意:</strong>
    同一ノード・同一トラッカーから複数のペルソナで掲載すると、ネットワーク観測によりペルソナ間のリンクが推定されうることに留意してください。
  </div>

  <!-- ペルソナ 0 個時の作成導線 (FR-013) -->
  <div id="empty-guidance" class="notice" hidden>
    ペルソナがまだありません。まず 1 つ作成すると、それが自動的に選択中になり、掲載時に名乗るペルソナになります。
  </div>

  <section>
    <h2>新規ペルソナ作成</h2>
    <label>表示名: <input id="new-label" type="text" maxlength="64" placeholder="ペルソナ名(最大 64 文字)"></label>
    <button id="create-btn">作成</button>
    <div id="create-result"></div>
  </section>

  <section>
    <h2>ペルソナ一覧</h2>
    <div id="list-status" class="muted">読み込み中...</div>
    <table id="personas-table" hidden>
      <thead>
        <tr>
          <th>選択</th><th>公開鍵(短縮)</th><th>表示名</th><th>状態</th><th>作成日時</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="personas-body"></tbody>
    </table>
  </section>

  <noscript>この画面は JavaScript を利用します。</noscript>
  <script>
    let token = null;
    let currentPersonas = [];
    // 配信中フラグ(GET /status の 5 秒ポーリングで更新 — FR-005 UI 側)。
    // UI の無効化は best-effort であり、真の強制はバックエンドの 409 拒否(ADR-0011)。
    let broadcasting = false;

    async function loadToken() {
      const res = await fetch('/api/v1/token');
      if (!res.ok) throw new Error('token');
      token = (await res.json()).token;
    }

    function shortPubkey(pk) {
      if (!pk) return '';
      return pk.substring(0, 16) + '…';
    }

    function fmtTime(sec) {
      if (!sec) return '—';
      return new Date(sec * 1000).toLocaleString();
    }

    // 配信中真偽を GET /status から取得しバナー表示を更新する。
    async function refreshStatus() {
      try {
        const res = await fetch('/api/v1/status');
        if (res.ok) broadcasting = !!(await res.json()).broadcasting;
      } catch (e) { /* 取得失敗時は前回値を保持 */ }
      document.getElementById('broadcasting-banner').hidden = !broadcasting;
    }

    // 選択中ペルソナの切り替え(即時・確認ダイアログなし — FR-012)。
    async function selectPersona(pk) {
      const r = await fetch('/api/v1/personas/' + pk, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Api-Token': token },
        body: JSON.stringify({ select: true }),
      });
      if (r.ok) { await refreshStatus(); loadPersonas(); return; }
      // 送信時点で配信中だった等(古い画面状態の競合)は理由を提示し画面を最新化する。
      let err = '';
      try { err = (await r.json()).error || ''; } catch (e) { /* body なし */ }
      if (err === 'broadcasting_locked') {
        alert('配信中はペルソナを変更できません。配信を停止してからお試しください。');
      } else if (err === 'persona_not_selectable') {
        alert('このペルソナ(アーカイブ済み)は選択できません。');
      } else if (err === 'persona_unusable') {
        alert('このペルソナは利用できません(鍵の復号に失敗しました)。');
      } else {
        alert('選択に失敗しました: ' + r.status);
      }
      await refreshStatus();
      loadPersonas();
    }

    async function loadPersonas() {
      const statusEl = document.getElementById('list-status');
      try {
        const res = await fetch('/api/v1/personas');
        if (!res.ok) { statusEl.textContent = 'エラー: ' + res.status; return; }
        currentPersonas = await res.json();
        const tbody = document.getElementById('personas-body');
        tbody.innerHTML = '';

        // 現在選択中ペルソナの表示(GET /personas の selected フラグから導出)。
        const selected = currentPersonas.find(p => p.selected);
        if (selected) {
          document.getElementById('current-persona-banner').hidden = false;
          document.getElementById('no-current-banner').hidden = true;
          document.getElementById('current-persona-label').textContent = selected.label;
          document.getElementById('current-persona-pubkey').textContent = shortPubkey(selected.pubkey);
        } else {
          document.getElementById('current-persona-banner').hidden = true;
          document.getElementById('no-current-banner').hidden = false;
        }

        if (currentPersonas.length === 0) {
          // 0 個時は作成導線を出す(FR-013)。
          statusEl.textContent = '';
          document.getElementById('empty-guidance').hidden = false;
          document.getElementById('personas-table').hidden = true;
          return;
        }
        document.getElementById('empty-guidance').hidden = true;
        statusEl.textContent = '';
        document.getElementById('personas-table').hidden = false;

        for (const p of currentPersonas) {
          const tr = document.createElement('tr');
          const isUnusable = p.usable === false;
          const isActive = p.state === 'active';
          const selectable = isActive && !isUnusable;
          if (p.selected) tr.className = 'current-persona';

          let stateLabel = isUnusable ? '<span class="unavailable">利用不可(復号失敗)</span>'
            : isActive ? '有効' : 'アーカイブ';

          // 選択列: 選択中はラベル、選択可能はボタン(配信中は best-effort 無効化)、
          // archived/unusable は無効化ボタン(グレーアウト — FR-003)。
          let selCell;
          if (p.selected) {
            selCell = '<span class="ok">選択中</span>';
          } else if (selectable) {
            const dis = broadcasting ? 'disabled title="配信中は変更できません"' : '';
            selCell = `<button class="select-btn" data-pk="${escHtml(p.pubkey)}" ${dis}>選択</button>`;
          } else {
            selCell = '<button disabled title="有効かつ利用可能なペルソナのみ選択できます">選択</button>';
          }

          // 配信中は selected 行の破棄・アーカイブを無効化する(FR-005 UI 側)。
          const lockSelectedOps = broadcasting && p.selected;
          let ops = '';
          if (!isUnusable) {
            const adis = lockSelectedOps ? 'disabled title="配信中は変更できません"' : '';
            ops += `<button class="archive-btn" data-pk="${escHtml(p.pubkey)}" data-state="${escHtml(p.state)}" ${adis}>
              ${p.state === 'archived' ? '有効化' : 'アーカイブ'}</button> `;
            ops += `<button class="export-btn" data-pk="${escHtml(p.pubkey)}" data-label="${escHtml(p.label)}">nsec エクスポート</button> `;
          }
          const ddis = lockSelectedOps ? 'disabled title="配信中は変更できません"' : '';
          ops += `<button class="delete-btn" data-pk="${escHtml(p.pubkey)}" data-label="${escHtml(p.label)}" ${ddis}>破棄</button>`;

          tr.innerHTML = `
            <td>${selCell}</td>
            <td title="${escHtml(p.pubkey)}">${shortPubkey(p.pubkey)}</td>
            <td>${escHtml(p.label)}</td>
            <td>${stateLabel}</td>
            <td>${fmtTime(p.created_at)}</td>
            <td>${ops}</td>
          `;
          tbody.appendChild(tr);
        }

        // 選択ボタン(即時・確認ダイアログなし — FR-012)
        document.querySelectorAll('.select-btn').forEach(btn => {
          btn.addEventListener('click', () => selectPersona(btn.dataset.pk));
        });

        // アーカイブ/有効化ボタン
        document.querySelectorAll('.archive-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const newState = btn.dataset.state === 'archived' ? 'active' : 'archived';
            const r = await fetch('/api/v1/personas/' + btn.dataset.pk, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'X-Api-Token': token },
              body: JSON.stringify({ state: newState }),
            });
            if (r.ok) { loadPersonas(); return; }
            let err = ''; try { err = (await r.json()).error || ''; } catch (e) {}
            if (err === 'broadcasting_locked') {
              alert('配信中は選択中ペルソナをアーカイブできません。配信を停止してからお試しください。');
              await refreshStatus();
            } else {
              alert('操作失敗: ' + r.status);
            }
            loadPersonas();
          });
        });

        // nsec エクスポートボタン (contracts/local-api.md §export — 警告 + 確認は維持 FR-012)
        document.querySelectorAll('.export-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const label = btn.dataset.label;
            const warning =
              `【警告】ペルソナ「${label}」の秘密鍵(nsec)をエクスポートします。\n\n` +
              '・秘密鍵を知る者はこのペルソナとして掲載できます。\n' +
              '・ペルソナを破棄した後は復元できず、これが唯一のバックアップ手段です。\n\n' +
              '本当にエクスポートしますか？';
            if (!confirm(warning)) return;
            const r = await fetch('/api/v1/personas/' + btn.dataset.pk + '/export', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Api-Token': token },
              body: JSON.stringify({ confirm: true }),
            });
            if (r.ok) {
              const data = await r.json();
              alert('nsec:\n\n' + data.nsec + '\n\n' + (data.warning || '') +
                '\n\n安全な場所に保管してください。この画面を閉じると再表示できません。');
            } else {
              alert('エクスポート失敗: ' + r.status);
            }
          });
        });

        // 破棄ボタン (確認ダイアログは維持 — FR-012)
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm(`ペルソナ「${btn.dataset.label}」を破棄しますか？\nこの操作は復元できません。`)) return;
            const r = await fetch('/api/v1/personas/' + btn.dataset.pk + '?confirm=true', {
              method: 'DELETE',
              headers: { 'X-Api-Token': token },
            });
            if (r.ok) { loadPersonas(); return; }
            let err = ''; try { err = (await r.json()).error || ''; } catch (e) {}
            if (err === 'broadcasting_locked') {
              alert('配信中は選択中ペルソナを破棄できません。配信を停止してからお試しください。');
              await refreshStatus();
            } else {
              alert('破棄失敗: ' + r.status);
            }
            loadPersonas();
          });
        });

      } catch (e) {
        statusEl.textContent = 'エラー: ' + e;
      }
    }

    document.getElementById('create-btn').addEventListener('click', async () => {
      const label = document.getElementById('new-label').value.trim();
      if (!label) { document.getElementById('create-result').innerHTML = '<span class="err">表示名を入力してください。</span>'; return; }
      const r = await fetch('/api/v1/personas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Api-Token': token },
        body: JSON.stringify({ label }),
      });
      const resultEl = document.getElementById('create-result');
      if (r.ok) {
        const data = await r.json();
        resultEl.innerHTML = '<span class="ok">作成しました: ' + escHtml(data.pubkey) + '</span>';
        document.getElementById('new-label').value = '';
        loadPersonas();
      } else {
        resultEl.innerHTML = '<span class="err">作成失敗: ' + r.status + '</span>';
      }
    });

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // 配信中フラグの 5 秒ポーリング。状態が変わったら一覧を再描画してボタン活性を追随させる。
    async function pollStatus() {
      const prev = broadcasting;
      await refreshStatus();
      if (broadcasting !== prev) loadPersonas();
    }

    (async () => {
      try { await loadToken(); } catch(e) {}
      await refreshStatus();
      await loadPersonas();
      setInterval(pollStatus, 5000);
    })();
  </script>
</body>
</html>
